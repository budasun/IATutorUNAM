<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#002B5C">
  <title>Sin Conexión - TIAUNAM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(to bottom, #002B5C, #001a3d, #000);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #D4AF37;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 24px;
    }
    h1 { font-size: 28px; color: #D4AF37; margin-bottom: 12px; }
    p { font-size: 16px; color: #c0c0c0; margin-bottom: 8px; max-width: 320px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 32px; }
    .buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; }
    a, button {
      background: transparent;
      border: 2px solid #D4AF37;
      color: #D4AF37;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    a:hover, button:hover {
      background: rgba(212, 175, 55, 0.15);
    }
    .primary {
      background: #D4AF37;
      color: #002B5C;
    }
    .primary:hover {
      background: #e5c349;
    }
  </style>
</head>
<body>
  <div class="icon">📚</div>
  <h1>Modo Sin Conexión</h1>
  <p>No te preocupes, puedes seguir estudiando con las guías que ya descargaste.</p>
  <p class="sub">Las funciones que requieren IA (simulador, diagnóstico) estarán disponibles cuando recuperes la conexión.</p>
  <div class="buttons">
    <a href="/temario" class="primary">📖 Ir al Temario</a>
    <button onclick="window.location.reload()">🔄 Reintentar Conexión</button>
    <a href="/">🏠 Intentar Inicio</a>
  </div>
</body>
</html>
