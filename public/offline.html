<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#002B5C">
  <title>Sin Conexión - TIAUNAM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #002B5C;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
      padding: 20px;
      text-align: center;
    }
    h1 { font-size: 24px; color: #D4AF37; margin-bottom: 16px; }
    p { font-size: 16px; color: #c0c0c0; margin-bottom: 32px; }
    a {
      background: transparent;
      border: 2px solid #D4AF37;
      color: #D4AF37;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>TIAUNAM</h1>
  <p>Estás en modo offline, pero tus conocimientos están a salvo.</p>
  <a href="/temario">Ir a mis guías guardadas</a>

</html>
