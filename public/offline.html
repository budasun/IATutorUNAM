<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#002B5C">
  <title>Modo Offline - TIAUNAM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #002B5C 0%, #001a3d 50%, #000000 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: #D4AF37;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 24px;
      color: #D4AF37;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      color: #c0c0c0;
      max-width: 300px;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .btn {
      background: #D4AF37;
      color: #002B5C;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
    }
  </style>
</head>
<body>
  <div class="logo">🎓</div>
  <h1>Estás en modo offline</h1>
  <p>Puedes seguir repasando tus temas guardados en el Temario.</p>
  <a href="/temario" class="btn">Ir al Temario</a>
</body>
</html>
